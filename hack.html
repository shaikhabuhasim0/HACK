<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Malegaon Hacker</title>
  <link rel="stylesheet" href="hack.css" />
</head>
<body>
 
  <div class="scanline"></div>
 
  <div class="wrapper">
    <div class="terminal">
 
      <div class="titlebar">
        <div class="dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span class="title-text">MALEGAON_HACKER.exe — root@bash</span>
      </div>
 
      <div class="body">
        <div id="output"></div>
        <div id="idle-cursor"><span class="prompt">root@malegaon:~$</span> <span class="cursor"></span></div>
      </div>
 
    </div>
 
    <div class="btn-row">
      <button id="runBtn" onclick="startHack()">▶ &nbsp;RUN PROGRAM</button>
    </div>
  </div>
 
  <script src="hack.js"></script>
</body>
</html>
